name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      tag: ${{ steps.bump.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # needed to read git history
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Bump patch version
        id: bump
        run: |
          OLD=$(node -p "require('./package.json').version")
          npm version patch --no-git-tag-version
          NEW=$(node -p "require('./package.json').version")
          echo "new_version=$NEW" >> $GITHUB_OUTPUT
          echo "tag=v$NEW" >> $GITHUB_OUTPUT
          echo "Bumped $OLD → $NEW"

      - name: Commit version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: release v${{ steps.bump.outputs.new_version }} [skip ci]"
          git tag ${{ steps.bump.outputs.tag }}
          git push origin master --follow-tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          name: v${{ steps.bump.outputs.new_version }}
          generate_release_notes: true   # auto-generates changelog from commits
          draft: false
          prerelease: false

  build-binaries:
    needs: release
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            outfile: oc-evict-linux
          - os: windows-latest
            target: bun-windows-x64
            outfile: oc-evict-windows.exe
          - os: macos-latest
            target: bun-darwin-x64
            outfile: oc-evict-darwin-x64
          - os: macos-latest
            target: bun-darwin-arm64
            outfile: oc-evict-darwin-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}   # checkout the tagged commit

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build binary
        run: bun build src/index.ts --compile --minify --target=${{ matrix.target }} --outfile=releases/${{ matrix.outfile }}

      - name: Upload binary to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.tag }}
          files: releases/${{ matrix.outfile }}